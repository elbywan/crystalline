name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  macos:
    strategy:
      matrix:
        runner: [macos-latest, macos-13]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Install Crystal
        env:
          HOMEBREW_NO_INSTALL_UPGRADE: 1
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
        run: brew update && brew install crystal || true
      - name: Install dependencies
        run: shards install --production --ignore-crystal-version
      - name: Build the binary
        run: |
          export LLVM_CONFIG="$(brew --prefix llvm)/bin/llvm-config"
          shards build crystalline --release --no-debug -Dpreview_mt --stats --progress --ignore-crystal-version
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: crystalline_${{ matrix.runner == 'macos-latest' && 'arm64' || 'x86_64' }}-apple-darwin
          path: ./bin/crystalline
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Build the static binary
        run: docker build -t crystalline .
      - name: Copy binary to host
        run: |
          docker run -v $PWD:/app/host --rm crystalline:latest cp ./bin/crystalline ./host/crystalline
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: crystalline_x86_64-unknown-linux-musl
          path: ./crystalline
  release:
    needs: [macos, linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: ./artifacts
      - name: Compress and rename artifacts
        run: |
          gzip -r ./artifacts
          mv ./artifacts/crystalline_x86_64-unknown-linux-musl/crystalline.gz ./artifacts/crystalline_x86_64-unknown-linux-musl.gz
          mv ./artifacts/crystalline_x86_64-apple-darwin/crystalline.gz ./artifacts/crystalline_x86_64-apple-darwin.gz
          mv ./artifacts/crystalline_arm64-apple-darwin/crystalline.gz ./artifacts/crystalline_arm64-apple-darwin.gz
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ./artifacts/crystalline_x86_64-unknown-linux-musl.gz
            ./artifacts/crystalline_x86_64-apple-darwin.gz
            ./artifacts/crystalline_arm64-apple-darwin.gz
